  name: Static Build
  
  on:
    push:
      branches:
        - main
    
  jobs:
    build:
      if: github.repository == 'Tobias027/castellarin'
      runs-on: ubuntu-lastest

      permissions:
        contents: write

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Setup python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12.5'

        - name: Run build script
          run: |
            chmod +x ./castellarinautorepuestos/remote_build.sh
            ./castellarinautorepuestos/remote_build.sh

        - name: Commit and Push changes
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: Update static build
            commit_user_name: Tobias Castellarin [GitHub Actions]
            commit_user_email: castellarintobias@gmail.com
            commit_author: tobias <castellarintobias@gmail.com>
